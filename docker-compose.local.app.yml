# Локальная среда: API и метрики/health на 127.0.0.1 + healthcheck через curl (образ приложения).

services:
  app:
    ports:
      - "127.0.0.1:${SERVER_PORT}:${SERVER_PORT}"
      - "127.0.0.1:${PROMETHEUS_HOST_PORT}:${PROMETHEUS_PORT}"
      - "127.0.0.1:6060:6060"
    healthcheck:
      test: [ "CMD", "curl", "-sf", "http://127.0.0.1:${PROMETHEUS_PORT}/health" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
