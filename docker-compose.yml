# Полный стек: инфра + приложение.
# Локально: make run-local (подмешивает docker-compose.local.infra.yml и docker-compose.local.app.yml).

include:
  - path: docker-compose.infra.yml

services:

  app:
    build: .
    container_name: booking_bot_server
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_NAME: ${DB_NAME}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST_PORT: db:5432
      REDIS_ADDR: redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      YANDEX_FORMS_WEBHOOK_TOKEN: ${YANDEX_FORMS_WEBHOOK_TOKEN}
      API_ONLY: ${API_ONLY:-false}
      SERVER_PORT: ${SERVER_PORT}
      PROMETHEUS_PORT: ${PROMETHEUS_PORT}
      JWT_SECRET: ${JWT_SECRET:-}

      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_USE_SSL: ${MINIO_USE_SSL}
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL}

      FILE_GC_ENABLED: ${FILE_GC_ENABLED}
      FILE_GC_INTERVAL: ${FILE_GC_INTERVAL}
      FILE_GC_ORPHAN_GRACE_PERIOD: ${FILE_GC_ORPHAN_GRACE_PERIOD}
      FILE_GC_DELETE_BATCH_SIZE: ${FILE_GC_DELETE_BATCH_SIZE}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_BASE_URL: ${EMAIL_BASE_URL}

    networks:
      - monitoring
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
