# Полный стек: инфра + приложение.
# Локально: make run-local (подмешивает docker-compose.local.infra.yml и docker-compose.local.app.yml).

include:
  - path: docker-compose.infra.yml

services:

  app:
    build: .
    container_name: booking_bot_server
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_NAME: ${DB_NAME}
      REDIS_DB: ${REDIS_DB}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      DB_HOST_PORT: db:5432
      REDIS_ADDR: redis:6379
      BOT_TOKEN: ${BOT_TOKEN}
      API_ONLY: ${API_ONLY:-false}
      SERVER_PORT: ${SERVER_PORT}
      PROMETHEUS_PORT: ${PROMETHEUS_PORT}
      JWT_SECRET: ${JWT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
