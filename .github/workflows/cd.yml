name: Deploy dev

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
      - devops/test-deploy-dev
    types:
      - completed
  # push:
  #   branches:
  #     - main
  #     - devops/test-deploy-dev

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: deploy
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Prepare image metadata
        id: image
        env:
          REPOSITORY: ${{ github.repository }}
          IMAGE_SHA: ${{ github.event.workflow_run.head_sha }}
          # IMAGE_SHA: ${{ github.sha }}
        run: |
          image_name="ghcr.io/${REPOSITORY,,}"
          echo "name=${image_name}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=sha-${IMAGE_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup config file
        run: cp config/config.example.yaml config/config.yaml

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          pull: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.name }}:latest

      - name: Render deployment environment
        env:
          CI_APP_IMAGE: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.sha_tag }}
          CI_BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CI_CADDY_DOMAIN_NAME: ${{ vars.CADDY_DOMAIN_NAME }}
          CI_CADDY_LETSENCRYPT_EMAIL: ${{ vars.CADDY_LETSENCRYPT_EMAIL }}
          CI_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CI_DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          CI_YANDEX_FORMS_WEBHOOK_TOKEN: ${{ secrets.YANDEX_FORMS_WEBHOOK_TOKEN }}
          CI_MINIO_PUBLIC_BASE_URL: ${{ vars.MINIO_PUBLIC_BASE_URL }}
          CI_SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          pip3 install dump-env
          dump-env \
            -t .env.example \
            -p 'CI_' > .env

      - name: Copy deployment bundle to host
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          source: "."
          target: "backend"
          rm: true

      - name: Pull and restart production stack
        uses: appleboy/ssh-action@v1
        env:
          REGISTRY_HOST: ghcr.io
          REGISTRY_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ vars.SSH_DEPLOY_HOST }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_KEY }}
          envs: REGISTRY_HOST,REGISTRY_USERNAME,GITHUB_TOKEN
          script: |
            mkdir -p ~/backend ~/frontend
            cd ~/backend
            printf '%s' "$GITHUB_TOKEN" | docker login "$REGISTRY_HOST" -u "$REGISTRY_USERNAME" --password-stdin >/dev/null
            bash ./scripts/server-deploy
